<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEMONOPIA • Birthday Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
        }
        
        body {
            background: radial-gradient(circle at center, #1a0033 0%, #000000 70%);
            overflow: hidden;
        }
        
        .countdown-number {
            font-family: 'Press Start 2P', system-ui;
            text-shadow: 
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-pink),
                0 0 60px var(--neon-cyan);
            animation: neon-flicker 1.5s infinite alternate;
        }
        
        @keyframes neon-flicker {
            0%, 19% { opacity: 1; }
            20%, 24% { opacity: 0.8; }
            25%, 54% { opacity: 1; }
            55%, 59% { opacity: 0.8; }
            60%, 100% { opacity: 1; }
        }
        
        .overlay {
            transition: all 5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #birthdayMessage {
            animation: messagePop 4s ease forwards;
        }
        
        canvas {
            mix-blend-mode: screen;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white relative">
    <!-- Main Countdown -->
    <div class="relative z-10 text-center px-8 max-w-4xl mx-auto">
        <div class="mb-8">
            <h1 class="text-5xl md:text-7xl font-bold tracking-[4px] mb-2 bg-gradient-to-r from-pink-400 via-cyan-400 to-pink-400 bg-clip-text text-transparent">
                DAEMONOPIA'S
            </h1>
            <h2 class="text-6xl md:text-8xl font-bold tracking-widest text-white drop-shadow-2xl">
                BIRTHDAY
            </h2>
            <p class="text-cyan-300 text-xl md:text-2xl mt-4 font-mono tracking-[6px]">JUNE 30TH • ALWAYS COUNTING DOWN</p>
        </div>

        <!-- Countdown Display -->
        <div id="countdown" class="flex flex-wrap justify-center gap-6 md:gap-12 items-center bg-black/40 backdrop-blur-xl rounded-3xl p-8 md:p-12 border border-pink-500/30 shadow-2xl shadow-pink-500/20">
            <div class="text-center">
                <div id="days" class="countdown-number text-7xl md:text-8xl lg:text-[9rem] font-bold text-white tabular-nums">000</div>
                <div class="text-pink-300 text-sm md:text-base tracking-[3px] mt-1">DAYS</div>
            </div>
            <div class="text-6xl md:text-7xl text-pink-500/80">:</div>
            
            <div class="text-center">
                <div id="hours" class="countdown-number text-7xl md:text-8xl lg:text-[9rem] font-bold text-white tabular-nums">00</div>
                <div class="text-pink-300 text-sm md:text-base tracking-[3px] mt-1">HOURS</div>
            </div>
            <div class="text-6xl md:text-7xl text-pink-500/80">:</div>
            
            <div class="text-center">
                <div id="minutes" class="countdown-number text-7xl md:text-8xl lg:text-[9rem] font-bold text-white tabular-nums">00</div>
                <div class="text-pink-300 text-sm md:text-base tracking-[3px] mt-1">MINUTES</div>
            </div>
            <div class="text-6xl md:text-7xl text-pink-500/80">:</div>
            
            <div class="text-center">
                <div id="seconds" class="countdown-number text-7xl md:text-8xl lg:text-[9rem] font-bold text-white tabular-nums">00</div>
                <div class="text-pink-300 text-sm md:text-base tracking-[3px] mt-1">SECONDS</div>
            </div>
        </div>

        <div class="mt-10 text-cyan-300/70 font-mono text-sm md:text-base flex items-center justify-center gap-2">
            <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
            NEXT BIRTHDAY • JUNE 30TH
            <span id="targetYear" class="font-bold text-pink-400"></span>
        </div>
    </div>

    <!-- Audio -->
    <audio id="birthdayAudio" preload="auto">
        <!-- REPLACE THIS WITH YOUR OWN AUDIO FILE -->
        <!-- Example: Put your favorite birthday song / sound effect as "audio.mp3" in the same folder -->
        <!-- Or use any direct MP3 URL -->
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5d0a8b9e2c.mp3?filename=happy-birthday-to-you-13285.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Overlay Visuals (hidden until 30 seconds before) -->
    <div id="overlay" class="overlay absolute inset-0 hidden flex items-center justify-center bg-gradient-to-b from-transparent via-black/70 to-black/90 z-20">
        <div class="text-center px-6">
            <!-- Cool visuals appear here -->
            <div id="birthdayMessage" class="hidden text-[4.5rem] md:text-8xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-yellow-300 to-cyan-400 drop-shadow-[0_0_40px_#ff00ff]">
                HAPPY<br>BIRTHDAY<br>DAEMONOPIA!
            </div>
            <p class="text-cyan-300 text-xl md:text-3xl mt-8 font-mono tracking-widest animate-pulse">THE MOMENT HAS ARRIVED ✨</p>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti" class="absolute inset-0 z-30 hidden"></canvas>

    <script>
        // Tailwind script initialization
        function initTailwind() {
            // Already loaded via CDN
        }

        // Get next June 30th at midnight in local time
        function getNextJune30() {
            const now = new Date();
            let year = now.getFullYear();
            
            // Create June 30th of this year
            const thisYearJune30 = new Date(year, 5, 30, 0, 0, 0);
            
            // If we're already past or on June 30th this year, use next year
            if (now >= thisYearJune30) {
                year++;
            }
            
            return new Date(year, 5, 30, 0, 0, 0);
        }

        // Format number with leading zeros
        function pad(num, size = 2) {
            return String(num).padStart(size, '0');
        }

        // Confetti system
        let particles = [];
        let animationFrame;
        let confettiRunning = false;
        
        function createParticle() {
            const colors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff0088', '#8800ff'];
            return {
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight - window.innerHeight,
                vx: (Math.random() - 0.5) * 6,
                vy: Math.random() * 8 + 4,
                size: Math.random() * 14 + 8,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 12,
                gravity: 0.15,
                life: 300 + Math.random() * 200
            };
        }
        
        function startConfetti() {
            if (confettiRunning) return;
            confettiRunning = true;
            
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.classList.remove('hidden');
            
            particles = [];
            // Burst of 600 particles
            for (let i = 0; i < 600; i++) {
                particles.push(createParticle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let stillAlive = false;
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.rotation += p.rotationSpeed;
                    p.life--;
                    
                    // Gentle horizontal sway
                    p.vx += (Math.random() - 0.5) * 0.8;
                    
                    // Draw the particle
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                    
                    if (p.life > 0 && p.y < canvas.height + 50) {
                        stillAlive = true;
                    } else {
                        // Recycle particle from top
                        if (Math.random() > 0.6) {
                            p.y = -50;
                            p.life = 250 + Math.random() * 150;
                            p.vy = Math.random() * 6 + 3;
                        }
                    }
                }
                
                if (stillAlive || particles.length > 0) {
                    animationFrame = requestAnimationFrame(animate);
                } else {
                    confettiRunning = false;
                    canvas.classList.add('hidden');
                }
            }
            
            animate();
            
            // Keep confetti going for at least 45 seconds (the whole audio + visuals)
            setTimeout(() => {
                if (confettiRunning) {
                    // Slowly fade out by stopping new particles
                    particles = particles.slice(0, 200);
                }
            }, 45000);
        }
        
        // Main countdown logic
        let audioTriggered = false;
        
        function updateCountdown() {
            const targetDate = getNextJune30();
            const now = new Date();
            const timeLeft = targetDate.getTime() - now.getTime();
            
            // Update the target year display
            document.getElementById('targetYear').textContent = targetDate.getFullYear();
            
            // If we've already passed June 30th this year, timeLeft will be for next year
            if (timeLeft <= 0) {
                // Should never really hit this due to getNextJune30 logic, but safety
                document.getElementById('days').textContent = '000';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            
            // Calculate time components
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
            
            // Update display
            document.getElementById('days').textContent = pad(days, 3);
            document.getElementById('hours').textContent = pad(hours);
            document.getElementById('minutes').textContent = pad(minutes);
            document.getElementById('seconds').textContent = pad(seconds);
            
            // === MAGIC MOMENT: 30 seconds before June 30th ===
            if (timeLeft <= 30000 && !audioTriggered) {
                audioTriggered = true;
                
                const audio = document.getElementById('birthdayAudio');
                const overlay = document.getElementById('overlay');
                const message = document.getElementById('birthdayMessage');
                
                // Play audio (30 seconds before the birthday hits)
                audio.play().catch(err => {
                    console.log("Audio autoplay prevented by browser. Click anywhere to enable sound.");
                });
                
                // Reveal the overlay
                overlay.classList.remove('hidden');
                overlay.style.opacity = '1';
                
                // Slowly reveal the birthday message
                setTimeout(() => {
                    message.classList.remove('hidden');
                }, 800);
                
                // Launch insane confetti
                startConfetti();
                
                console.log('%c🎉 IT\'S HAPPENING! Happy Birthday DAETRONIC!', 'color:#ff00ff; font-size:18px; font-family:monospace');
            }
        }
        
        // Handle window resize for confetti
        function handleResize() {
            const canvas = document.getElementById('confetti');
            if (canvas && !canvas.classList.contains('hidden')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }
        
        // Initialize everything
        function init() {
            initTailwind();
            
            // Start the countdown loop
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // Listen for audio ending (optional)
            const audio = document.getElementById('birthdayAudio');
            audio.addEventListener('ended', () => {
                console.log('🎵 Birthday audio finished');
            });
            
            // Click anywhere on the overlay to replay visuals (nice touch)
            const overlay = document.getElementById('overlay');
            overlay.addEventListener('click', () => {
                if (audioTriggered) {
                    const message = document.getElementById('birthdayMessage');
                    message.classList.add('hidden');
                    setTimeout(() => {
                        message.classList.remove('hidden');
                    }, 100);
                    startConfetti();
                }
            });
            
            // Keyboard shortcut: press "B" to manually trigger birthday mode (for testing)
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'b') {
                    audioTriggered = false; // allow re-trigger
                    updateCountdown();
                }
            });
            
            window.addEventListener('resize', handleResize);
            
            console.log('%c🚀 DAEMONOPIA Birthday Countdown ready! It will automatically detect the next June 30th and go wild 30 seconds before midnight.', 'color:#00ffff; font-size:14px');
        }
        
        // Boot it up
        window.onload = init;
    </script>
</body>
</html>
